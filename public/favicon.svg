<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Northstar pulse icon">
  <defs>
    <linearGradient id="panel" x1="10" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#050914"/>
    </linearGradient>
    <radialGradient id="core" cx="0.32" cy="0.28" r="0.72">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#22d3ee" stop-opacity="0.88"/>
      <stop offset="0.75" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0b1227" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="ring" x1="10" y1="10" x2="54" y2="54">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spin-slow { transform-origin: 32px 32px; animation: spin 12s linear infinite; }
    .spin-fast { transform-origin: 32px 32px; animation: spin 18s linear infinite reverse; }
  </style>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#panel)" stroke="#121a2f" stroke-width="2"/>
  <circle cx="32" cy="32" r="23" fill="url(#core)" opacity="0.95"/>
  <g class="spin-slow">
    <circle cx="32" cy="32" r="18" fill="none" stroke="url(#ring)" stroke-width="3" stroke-dasharray="36 20" stroke-linecap="round"/>
    <circle cx="32" cy="32" r="20" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2" stroke-dasharray="6 10" />
    <circle cx="52" cy="32" r="3.4" fill="#a855f7" stroke="#f8eaff" stroke-width="1.2" />
  </g>
  <g class="spin-fast" opacity="0.75">
    <circle cx="32" cy="32" r="11" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="12 10" stroke-linecap="round" />
    <circle cx="32" cy="21" r="2.2" fill="#22d3ee" stroke="#e6faff" stroke-width="1" />
  </g>
  <path d="M32 22l1.6 4.3 4.4.4-3.3 2.6.9 4.2L32 31l-3.6 2.5.9-4.2-3.3-2.6 4.4-.4z" fill="#ffffff" fill-opacity="0.92"/>
